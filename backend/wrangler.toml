name = "nutriflow-api"
main = "src/index.ts"
compatibility_date = "2024-07-25"
compatibility_flags = ["nodejs_compat"]

# KV namespace for rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_YOUR_KV_ID"
preview_id = "REPLACE_WITH_YOUR_KV_PREVIEW_ID"

# Hyperdrive for PostgreSQL (keeps your existing Neon/Supabase/Railway DB)
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "REPLACE_WITH_YOUR_HYPERDRIVE_ID"

# Secrets — set via: wrangler secret put JWT_SECRET
# Required secrets:
#   JWT_SECRET        - at least 32 chars
#   RESEND_API_KEY    - from resend.com (free tier: 3000 emails/month)
#   FRONTEND_URL      - e.g. https://nutriflow.pages.dev

[vars]
SMTP_FROM = "noreply@nutriflow.app"
