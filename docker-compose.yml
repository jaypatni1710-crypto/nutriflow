version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nutriflow-postgres
    environment:
      POSTGRES_USER: nutriflow
      POSTGRES_PASSWORD: nutriflow123
      POSTGRES_DB: nutriflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutriflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
